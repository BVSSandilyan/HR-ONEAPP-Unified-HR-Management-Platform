{% extends "base.html" %}
{% block title %}Assign Task - HR ONEAPP{% endblock %}
{% block page_title %}Assign Task{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <h3 style="margin-bottom:1.5rem;">📋 Assign New Task</h3>
  <form method="POST">
    <div class="form-group"><label>Task Title *</label><input type="text" name="title" required placeholder="e.g. Complete Q3 Report"/></div>
    <div class="form-group"><label>Description</label><textarea name="description" rows="3" placeholder="Describe the task..."></textarea></div>
    <div class="form-group"><label>Assign To *</label>
      <select name="assigned_to" required>
        <option value="">-- Select Employee / HR --</option>
        {% for u in users %}<option value="{{ u.id }}">{{ u.name }} ({{ u.role | capitalize }})</option>{% endfor %}
      </select></div>
    <div class="form-row cols-2">
      <div class="form-group"><label>Due Date</label><input type="date" name="due_date"/></div>
      <div class="form-group"><label>Priority</label>
        <select name="priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select></div>
    </div>
    <div class="info-box">ℹ️ The assignee will receive an instant notification.</div>
    <div style="display:flex;gap:1rem;margin-top:1rem;">
      <button type="submit" class="btn btn-primary">Assign Task</button>
      <a href="{{ url_for('task.index') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
